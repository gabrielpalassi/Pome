app-id: io.github.gabrielpalassi.Pome
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: pome
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.freedesktop.Flatpak
  - --env=PUPPETEER_CACHE_DIR=/app/lib/pome/puppeteer-cache
build-options:
  build-args:
    - --share=network
  env:
    PUPPETEER_CACHE_DIR: /app/lib/pome/puppeteer-cache
modules:
  - name: node
    buildsystem: simple
    sources:
      - type: archive
        url: https://nodejs.org/download/release/v22.22.0/node-v22.22.0-linux-x64.tar.xz
        sha256: 9aa8e9d2298ab68c600bd6fb86a6c13bce11a4eca1ba9b39d79fa021755d7c37
        strip-components: 1
    build-commands:
      - mkdir -p /app/node /app/bin
      - cp -a . /app/node
      - ln -s /app/node/bin/node /app/bin/node
      - ln -s /app/node/bin/npm /app/bin/npm
      - ln -s /app/node/bin/npx /app/bin/npx
  - name: pome
    buildsystem: simple
    sources:
      - type: dir
        path: .
    build-commands:
      - mkdir -p /app/lib/pome /app/bin /app/share/applications /app/share/metainfo
      - cp -a package.json package-lock.json tsconfig.json src /app/lib/pome/
      - cd /app/lib/pome && /app/node/bin/npm ci --omit=optional
      - cd /app/lib/pome && /app/node/bin/npm run build
      - cd /app/lib/pome && /app/node/bin/npm prune --omit=dev --omit=optional
      - chmod +x /app/lib/pome/dist/pome.js
      - ln -s /app/lib/pome/dist/pome.js /app/bin/pome
      - install -Dm644 data/io.github.gabrielpalassi.Pome.desktop /app/share/applications/io.github.gabrielpalassi.Pome.desktop
      - install -Dm644 data/io.github.gabrielpalassi.Pome.metainfo.xml /app/share/metainfo/io.github.gabrielpalassi.Pome.metainfo.xml
      - install -Dm644 data/icons/hicolor/128x128/apps/io.github.gabrielpalassi.Pome.png /app/share/icons/hicolor/128x128/apps/io.github.gabrielpalassi.Pome.png
      - install -Dm644 data/icons/hicolor/128x128/apps/io.github.gabrielpalassi.Pome.notification.png /app/share/icons/hicolor/128x128/apps/io.github.gabrielpalassi.Pome.notification.png
      - install -Dm644 data/icons/hicolor/256x256/apps/io.github.gabrielpalassi.Pome.png /app/share/icons/hicolor/256x256/apps/io.github.gabrielpalassi.Pome.png
      - install -Dm644 data/icons/hicolor/256x256/apps/io.github.gabrielpalassi.Pome.notification.png /app/share/icons/hicolor/256x256/apps/io.github.gabrielpalassi.Pome.notification.png
      - install -Dm644 data/icons/hicolor/512x512/apps/io.github.gabrielpalassi.Pome.png /app/share/icons/hicolor/512x512/apps/io.github.gabrielpalassi.Pome.png
      - install -Dm644 data/icons/hicolor/512x512/apps/io.github.gabrielpalassi.Pome.notification.png /app/share/icons/hicolor/512x512/apps/io.github.gabrielpalassi.Pome.notification.png
      - install -Dm644 data/icons/hicolor/symbolic/apps/io.github.gabrielpalassi.Pome-symbolic.svg /app/share/icons/hicolor/symbolic/apps/io.github.gabrielpalassi.Pome-symbolic.svg
