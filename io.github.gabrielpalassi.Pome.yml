app-id: io.github.gabrielpalassi.Pome
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: pome
finish-args:
  # Required for iCloud sign-in and rclone network access.
  - --share=network
  # Required by Chromium when rendering the visible Wayland sign-in window.
  - --share=ipc
  # Shows the iCloud sign-in window from the sandboxed app.
  - --socket=wayland
  # Enables Chromium rendering acceleration for the sign-in window.
  - --device=dri
  # Allows flatpak-spawn --host so Pome can manage the user's host rclone mount.
  - --talk-name=org.freedesktop.Flatpak
  # Keeps Puppeteer's bundled Chromium cache inside the app installation.
  - --env=PUPPETEER_CACHE_DIR=/app/lib/pome/puppeteer-cache
build-options:
  build-args:
    - --share=network
  env:
    PUPPETEER_CACHE_DIR: /app/lib/pome/puppeteer-cache
modules:
  - name: node
    buildsystem: simple
    sources:
      - type: archive
        url: https://nodejs.org/download/release/v24.16.0/node-v24.16.0-linux-x64.tar.xz
        sha256: d804845d34eddc21dc1092b519d643ef40b1f58ec5dec5c22b1f4bd8fabde6c9
        strip-components: 1
    build-commands:
      - mkdir -p /app/node /app/bin
      - cp -a . /app/node
      - ln -s /app/node/bin/node /app/bin/node
      - ln -s /app/node/bin/npm /app/bin/npm
      - ln -s /app/node/bin/npx /app/bin/npx
  - name: pome
    buildsystem: simple
    sources:
      - type: dir
        path: .
    build-commands:
      - mkdir -p /app/lib/pome /app/bin /app/share/applications /app/share/metainfo
      - cp -a package.json package-lock.json tsconfig.json src /app/lib/pome/
      - cd /app/lib/pome && /app/node/bin/npm ci --omit=optional
      - |
        cd /app/lib/pome
        chrome_path="$(/app/node/bin/node --input-type=module -e 'import puppeteer from "puppeteer"; process.stdout.write(puppeteer.executablePath())')"
        if ! test -x "$chrome_path"; then
          chrome_root="$(dirname "$(dirname "$chrome_path")")"
          chrome_version="$(basename "$chrome_root" | sed 's/^linux-//')"
          chrome_zip="$(dirname "$chrome_root")/${chrome_version}-chrome-linux64.zip"
          rm -rf "$chrome_root"
          mkdir -p "$chrome_root"
          unzip -q "$chrome_zip" -d "$chrome_root"
        fi
        test -x "$chrome_path"
      - cd /app/lib/pome && /app/node/bin/npm run build
      - cd /app/lib/pome && /app/node/bin/npm prune --omit=dev --omit=optional
      - chmod +x /app/lib/pome/dist/pome.js
      - ln -s /app/lib/pome/dist/pome.js /app/bin/pome
      - install -Dm644 data/io.github.gabrielpalassi.Pome.desktop /app/share/applications/io.github.gabrielpalassi.Pome.desktop
      - install -Dm644 data/io.github.gabrielpalassi.Pome.metainfo.xml /app/share/metainfo/io.github.gabrielpalassi.Pome.metainfo.xml
      - install -Dm644 data/icons/hicolor/scalable/apps/io.github.gabrielpalassi.Pome.svg /app/share/icons/hicolor/scalable/apps/io.github.gabrielpalassi.Pome.svg
      - install -Dm644 data/icons/hicolor/512x512/apps/io.github.gabrielpalassi.Pome.notification.png /app/share/icons/hicolor/512x512/apps/io.github.gabrielpalassi.Pome.notification.png
      - install -Dm644 data/icons/hicolor/symbolic/apps/io.github.gabrielpalassi.Pome-symbolic.svg /app/share/icons/hicolor/symbolic/apps/io.github.gabrielpalassi.Pome-symbolic.svg
